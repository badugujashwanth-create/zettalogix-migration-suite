name: ZMS Web UI CI

on:
  push:
    branches: [main, portfolio-polish]
  pull_request:

permissions:
  contents: read

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ZMS.WebUI
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ZMS.WebUI/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm audit
      - name: Install desktop shell dependencies
        run: npm ci
        working-directory: ZMS.DesktopApp
      - name: Test desktop shell boundaries
        run: npm test
        working-directory: ZMS.DesktopApp
      - name: Audit desktop shell dependencies
        run: npm audit
        working-directory: ZMS.DesktopApp
